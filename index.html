<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Crypto Trading Assistant PRO</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color: white;
    text-align: center;
    padding: 20px;
  }
  h1 { font-size: 22px; margin-bottom: 5px; }
  p.subtitle { opacity: 0.7; margin-bottom: 20px; }

  .box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    margin: auto;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  select, input {
    width: 90%; padding: 12px; margin: 8px;
    border-radius: 10px; border: none;
    background: #1f2937; color: white; font-size: 14px;
  }

  button {
    width: 90%; padding: 12px; margin: 10px;
    border-radius: 10px; border: none;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    color: black; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
  }
  button:hover { transform: scale(1.05); }

  .result {
    margin-top: 15px; padding: 15px;
    background: rgba(0,0,0,0.4);
    border-radius: 15px;
    text-align: left;
  }

  .green { color: #22c55e; }
  .red { color: #ef4444; }
  .yellow { color: #facc15; }
</style>
</head>
<body>

<h1>&#129302; AI Crypto Trading Assistant</h1>
<p class="subtitle">Smart decisions for beginners</p>

<div class="box">
  <select id="coin">
    <option value="solana">SOL</option>
    <option value="bitcoin">BTC</option>
    <option value="ethereum">ETH</option>
  </select>

  <input type="number" id="amount" placeholder="Enter Amount $" />

  <button onclick="analyze()">Analyze Market &#128640;</button>

  <div class="result">
    <p id="price"></p>
    <p id="trend"></p>
    <p id="suggestion"></p>
    <p id="risk"></p>
    <p id="profit"></p>
    <p id="ai"></p>
    <p id="pro"></p>
  </div>

  <button onclick="connectWallet()">&#128279; Connect Wallet</button>
</div>

<script>
async function analyze() {
  let coin = document.getElementById("coin").value;
  let amount = parseFloat(document.getElementById("amount").value) || 0;

  try {
    // fetch current price & 24h % change
    let response = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coin}`);
    let data = await response.json();
    let price = data[0].current_price;
    let change24h = data[0].price_change_percentage_24h;

    document.getElementById("price").innerHTML = "&#128176; Price: $" + price.toFixed(2);

    // Determine trend based on 24h % change
    let trend, suggestion, risk, msg, pro;
    if (change24h >= 2) {
      trend = "&#128200; Trend: UP";
      suggestion = "&#128161; BUY";
      risk = "&#9888; LOW RISK";
      msg = "Bullish trend detected. Good entry opportunity.";
      pro = "&#128104;&#8205;&#128188; Pro Traders: 80% BUY";
    } else if (change24h <= -2) {
      trend = "&#128202; Trend: DOWN";
      suggestion = "&#128161; SELL";
      risk = "&#9888; HIGH RISK";
      msg = "Bearish trend detected. Consider selling or waiting.";
      pro = "&#128104;&#8205;&#128188; Pro Traders: 75% SELL";
    } else {
      trend = "&#10145; Trend: SIDEWAYS";
      suggestion = "&#128161; HOLD";
      risk = "&#9888; MEDIUM RISK";
      msg = "Market stable. Wait for breakout.";
      pro = "&#128104;&#8205;&#128188; Pro Traders: 55% HOLD";
    }

    // Calculate potential profit/loss based on amount
    let potential = amount > 0 ? (amount * change24h / 100).toFixed(2) : 0;
    let profitText = amount > 0 ? `&#128200; Potential 24h change: $${potential}` : "";

    // Display results
    document.getElementById("trend").innerHTML = trend;
    document.getElementById("suggestion").innerHTML = suggestion;
    document.getElementById("risk").innerHTML = risk;
    document.getElementById("profit").innerHTML = profitText;
    document.getElementById("ai").innerHTML = "&#129504; AI: " + msg;
    document.getElementById("pro").innerHTML = pro;

  } catch (err) {
    document.getElementById("price").innerHTML = "&#10060; Error fetching price";
    document.getElementById("trend").innerHTML = "";
    document.getElementById("suggestion").innerHTML = "";
    document.getElementById("risk").innerHTML = "";
    document.getElementById("profit").innerHTML = "";
    document.getElementById("ai").innerHTML = "";
    document.getElementById("pro").innerHTML = "";
  }
}

function connectWallet() {
  alert("Phantom Wallet Connected (Demo)");
}
</script>

</body>
</html>
